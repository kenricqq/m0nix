model = "gpt-5.4"
model_reasoning_effort = "high"
network_access = true
# notify = ["python3", "./notify.py"]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_verbosity = "low"
project_root_markers = [".git", ".jj"]
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
service_tier = "fast"
allow_login_shell = false

[shell_environment_policy]
inherit = "all"
experimental_use_profile = true
include_only = ["PATH", "HOME", "USER"]

[history]
persistence = "save-all"
max_bytes = 5242880

[tui]
# Examples: true (default) | false | ["agent-turn-complete", "approval-requested"]
notifications = true

[feedback]
enabled = false

[analytics]
enabled = false

[profiles.deep-review]
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "on-request"

[profiles.local-fast]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "low"

[mcp_servers.chrome-devtools]
args = ["chrome-devtools-mcp@latest"]
command = "bunx"

[mcp_servers.svelte]
args = ["-y", "@sveltejs/mcp"]
command = "bunx"

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
steer = true

[projects."/Users/kenrictee/dev/projects/memori"]
trust_level = "trusted"

[projects."/Users/kenrictee/SandBox"]
trust_level = "trusted"

